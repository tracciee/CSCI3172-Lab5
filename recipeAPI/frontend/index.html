<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recipe Recommender</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
<link href="styles/style.css" rel="stylesheet">
</head>
<body>

<main class="container">
  <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
      <h1>Traccie's Recipe Finder!</h1>
  </header>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="border rounded p-4 h-100">
        <div class="search-container">
          <h2>Search for a recipe here!</h2>
          <label for="searchInput">Recipe Search</label>
          <input type="text" id="searchInput" class="form-control mb-2" placeholder="Search for recipes">
          <button id="searchButton" class="btn btn-primary w-100">Search</button>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="border rounded p-4 h-100">
        <label for="dietList" class="form-label">Choose a dietary restriction:</label>
        <select name="diets" id="dietList" class="form-select mb-3">
          <option value="none">None</option>
          <option value="vegetarian">Vegetarian</option>
          <option value="pescatarian">Pescatarian</option>
          <option value="gluten free">Gluten Free</option>
          <option value="whole30">Whole 30</option>
          <option value="paleo">Paleo</option>
          <option value="fodmap">low FODMAP</option>
          <option value="primal">Primal</option>
          <option value="vegan">Vegan</option>
          <option value="ketogenic">Ketogenic</option>
        </select>
        <div class="ingredient-container">
          <label for="ingredientInput">Add Ingredient</label>
          <input type="text" id="ingredientInput" class="form-control mb-2" placeholder="Add ingredients">
          <button id="ingredientButton" class="btn btn-secondary mb-2 w-100">
            Add Ingredient
          </button>
          <div id="ingredientList"></div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div id="infoBox" aria-live="polite" class="border rounded p-4 h-100">
        <p>Input your search criteria and click search!</p>
      </div>
    </div>
  </div>
      <div id="results" aria-live="polite" class="border rounded p-4 h-100">
        <p>Recipes will show here!</p>
      </div>
    </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src = "js/script.js"></script>

</body>
</html>
