<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Recipe Recommender</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
<link href="styles/style.css" rel="stylesheet">
</head>
<body>

<div class="container">
  <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
      <h1>Traccie's Recipe Finder!</h1>
  </header>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="border rounded p-4 h-100">
        <div class="search-container">
          <input type="text" id="searchInput" class="form-control mb-2" placeholder="Search for delicious recipes...">
          <button id="searchButton" class="btn btn-primary w-100">Search</button>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="border rounded p-4 h-100">
        <label for="restrictions" class="form-label">Choose a dietary restriction:</label>
        <select name="diets" id="dietList" class="form-select mb-3">
          <option value="none">None</option>
          <option value="vegetarian">Vegetarian</option>
          <option value="gluten free">Gluten Free</option>
          <option value="vegan">Vegan</option>
        </select>
        <div class="ingredient-container">
          <input type="text" id="ingredientInput" class="form-control mb-2" placeholder="Add ingredients">
          <button id="ingredientButton" class="btn btn-secondary mb-2 w-100">
            Add Ingredient
          </button>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="strictSearch">
            <label class="form-check-label" for="strictSearch">
              Strict Search
            </label>
          </div>
          <div id="ingredientList"></div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div id="infoBox" class="border rounded p-4 h-100"></div>
    </div>
  </div>
      <div id="results" class="border rounded p-4 h-100"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src = "js/script.js"></script>

</body>
</html>
